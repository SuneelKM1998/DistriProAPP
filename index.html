<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistriPro | Sunset Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .bg-gradient-main { background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%); }
        .cinema-gradient { background: linear-gradient(to right, #f59e0b, #ea580c); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .movie-banner { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="bg-gradient-main text-slate-800 min-h-screen font-sans" x-data="{ 
    page: 'login', 
    userRole: '',
    username: '', 
    password: '',
    selectedAnalyticMovie: '',
    isLoading: false,
    
    masterTheaters: {
        'S2': { 'Screen 1': 563, 'Screen 2': 626, 'Screen 3': 333 },
        'Mall': { 'Screen 1': 236, 'Screen 2': 131, 'Screen 3': 132, 'Screen 4': 238, 'Screen 5': 271 },
        'Rain': { 'Screen 1': 313, 'Screen 2': 314, 'Screen 3': 314, 'Screen 4': 381 },
        'Siri': { 'Screen 1': 385, 'Screen 2': 270, 'Screen 3': 69, 'Screen 4': 65 }
    },

    reports: [], 
    newEntry: { id: null, city: '', theater: '', screen: '', movie: '', time: '', slot: '', booked: 0, total: 0, date: '' },

    async loadData() {
        this.isLoading = true;
        try {
            const response = await fetch('https://DistriProAPI.azurewebsites.net/api/SyncData');
            if (response.ok) {
                this.reports = await response.json();
            }
        } catch (err) {
            console.error('Azure Load Failed');
        } finally { this.isLoading = false; }
    },

    handleLogin() {
        if(this.username === 'admin' && this.password === '8019589448') { 
            this.userRole = 'admin'; this.page = 'dashboard'; this.loadData();
        } else if(this.username === 'user' && this.password === '123456789') { 
            this.userRole = 'user'; this.page = 'dashboard'; this.loadData();
        } else { alert('Invalid Credentials'); }
    },

    updateCapacity() {
        if(this.newEntry.theater && this.newEntry.screen) {
            this.newEntry.total = this.masterTheaters[this.newEntry.theater][this.newEntry.screen];
        }
    },

    updateSlot() {
        if(!this.newEntry.time) return;
        let hour = parseInt(this.newEntry.time.split(':')[0]);
        if(hour >= 6 && hour < 10) this.newEntry.slot = 'Early Morning (6-10AM)';
        else if(hour >= 10 && hour < 14) this.newEntry.slot = 'Morning Show (10-2PM)';
        else if(hour >= 14 && hour < 18) this.newEntry.slot = 'Matinee (2-6PM)';
        else if(hour >= 18 && hour < 22) this.newEntry.slot = 'First Show (6-10PM)';
        else this.newEntry.slot = 'Second Show (10PM-1AM)';
    },

    async saveEntry() {
        if(!this.newEntry.movie || !this.newEntry.booked || !this.newEntry.date || !this.newEntry.time) {
            return alert('Fill all details reyy!');
        }

        try {
            const response = await fetch('https://DistriProAPI.azurewebsites.net/api/SyncData', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.newEntry)
            });

            if(response.ok) {
                alert('Data Synced to Azure Cloud!');
                await this.loadData();
                this.newEntry = { id: null, city: '', theater: '', screen: '', movie: '', time: '', slot: '', booked: 0, total: 0, date: '' };
            }
        } catch (err) { alert('Sync Failed reyy!'); }
    },

    deleteEntry(id) {
        if(confirm('Delete record?')) this.reports = this.reports.filter(r => r.id !== id);
    },

    get movieStats() {
        if(!this.selectedAnalyticMovie) return { booked: 0, screens: 0, total: 0 };
        let filtered = this.reports.filter(r => r.movie === this.selectedAnalyticMovie);
        return {
            booked: filtered.reduce((acc, curr) => acc + parseInt(curr.booked), 0),
            total: filtered.reduce((acc, curr) => acc + parseInt(curr.total), 0),
            screens: filtered.length
        }
    }
}">

    <nav class="cinema-gradient text-white shadow-xl p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-fire-alt text-yellow-300 text-3xl animate-pulse"></i>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">DistriPro <span class="text-yellow-200">Ultra</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div x-show="isLoading" class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                <span class="bg-black/20 px-3 py-1 rounded-full text-[10px] font-bold uppercase" x-text="userRole"></span>
                <button @click="page = 'login'" class="bg-white text-orange-600 px-4 py-1 rounded-lg font-bold text-sm shadow-md">Logout</button>
            </div>
        </div>
    </nav>

    <div x-show="page === 'login'" class="flex items-center justify-center pt-24 px-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border-b-[12px] border-orange-500">
            <div class="text-center mb-8">
                <i class="fa-solid fa-ticket-alt text-orange-500 text-5xl mb-4"></i>
                <h2 class="text-4xl font-black text-slate-800">WELCOME</h2>
                <p class="text-orange-400 font-bold text-xs uppercase tracking-widest">Cinema Distribution Portal</p>
            </div>
            <div class="space-y-4">
                <input x-model="username" type="text" placeholder="Username" class="w-full p-5 bg-orange-50 border-2 border-transparent focus:border-orange-400 rounded-2xl outline-none transition-all">
                <input x-model="password" type="password" placeholder="Password" class="w-full p-5 bg-orange-50 border-2 border-transparent focus:border-orange-400 rounded-2xl outline-none transition-all">
                <button @click="handleLogin()" class="w-full cinema-gradient text-white font-black py-5 rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition-all uppercase tracking-widest">Launch Dashboard</button>
            </div>
        </div>
    </div>

    <main x-show="page === 'dashboard'" x-cloak class="container mx-auto p-4 md:p-8 space-y-8">
        
        <div class="movie-banner w-full h-64 rounded-[2.5rem] p-8 flex flex-col justify-end shadow-2xl border-4 border-white">
            <div class="glass-card p-6 rounded-2xl inline-block max-w-lg">
                <h4 class="text-orange-600 font-black text-xs uppercase mb-1">Now Analyzing</h4>
                <h1 class="text-4xl font-black text-slate-900 uppercase" x-text="selectedAnalyticMovie || 'All Movies Summary'"></h1>
                <div class="flex gap-4 mt-2">
                    <span class="text-sm font-bold text-slate-600"><i class="fa-solid fa-star text-orange-500 mr-1"></i> Global Stats</span>
                    <span class="text-sm font-bold text-slate-600"><i class="fa-solid fa-clock text-orange-500 mr-1"></i> Real-time Sync</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-3xl border-2 border-orange-100 shadow-xl">
                <h4 class="text-xs font-black text-orange-500 uppercase mb-4">Select Movie to Focus</h4>
                <select x-model="selectedAnalyticMovie" class="w-full p-4 rounded-2xl bg-orange-50 border-none shadow-inner outline-none font-bold text-slate-700">
                    <option value="">Master View (All)</option>
                    <template x-for="movie in [...new Set(reports.map(r => r.movie))]">
                        <option :value="movie" x-text="movie"></option>
                    </template>
                </select>
            </div>
            <div class="cinema-gradient p-6 rounded-3xl shadow-xl flex flex-col justify-center transform hover:rotate-1 transition">
                <p class="text-[10px] font-black text-white/80 uppercase">Total Tickets Booked</p>
                <h2 class="text-5xl font-black text-white" x-text="movieStats.booked">0</h2>
            </div>
            <div class="bg-white p-6 rounded-3xl border-b-8 border-orange-500 shadow-xl flex flex-col justify-center">
                <p class="text-[10px] font-black text-slate-400 uppercase">Screen Presence</p>
                <h2 class="text-5xl font-black text-orange-600" x-text="movieStats.screens">0</h2>
            </div>
        </div>

        <div x-show="userRole === 'admin'" class="bg-white p-8 rounded-[3rem] shadow-xl border border-orange-100">
            <h3 class="font-black text-orange-600 mb-6 flex items-center gap-2 uppercase tracking-widest text-sm">
                <i class="fa-solid fa-bolt animate-bounce"></i> Push Live Data
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="flex flex-col">
                    <label class="text-[10px] font-black mb-1 ml-1 text-slate-500 uppercase">Show Date</label>
                    <input x-model="newEntry.date" type="date" class="bg-orange-50 p-4 rounded-2xl outline-none focus:ring-2 ring-orange-400">
                </div>
                
                <div class="flex flex-col">
                    <label class="text-[10px] font-black mb-1 ml-1 text-slate-500 uppercase">Cinema Hub</label>
                    <select x-model="newEntry.theater" @change="updateCapacity()" class="bg-orange-50 p-4 rounded-2xl outline-none">
                        <option value="">Select Theater</option>
                        <template x-for="t in Object.keys(masterTheaters)">
                            <option :value="t" x-text="t"></option>
                        </template>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-black mb-1 ml-1 text-slate-500 uppercase">Screen No</label>
                    <select x-model="newEntry.screen" @change="updateCapacity()" class="bg-orange-50 p-4 rounded-2xl outline-none">
                        <option value="">Select Screen</option>
                        <template x-if="newEntry.theater">
                            <template x-for="s in Object.keys(masterTheaters[newEntry.theater])">
                                <option :value="s" x-text="s"></option>
                            </template>
                        </template>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-black mb-1 ml-1 text-slate-500 uppercase">Show Time</label>
                    <input x-model="newEntry.time" @change="updateSlot()" type="time" class="bg-orange-50 p-4 rounded-2xl outline-none">
                </div>

                <input x-model="newEntry.movie" type="text" placeholder="Enter Movie Name" class="bg-orange-50 p-4 rounded-2xl outline-none">
                <input x-model="newEntry.city" type="text" placeholder="City Name" class="bg-orange-50 p-4 rounded-2xl outline-none">
                
                <div class="p-4 bg-orange-100 rounded-2xl border-2 border-orange-200">
                    <span class="text-[9px] font-black block uppercase text-orange-700">Total Capacity</span>
                    <input x-model="newEntry.total" type="number" class="bg-transparent font-black text-xl w-full outline-none">
                </div>

                <div class="p-4 bg-yellow-400 rounded-2xl border-2 border-orange-500">
                    <span class="text-[9px] font-black block uppercase text-orange-900">Seats Filled</span>
                    <input x-model="newEntry.booked" type="number" class="bg-transparent font-black text-xl w-full outline-none text-orange-900">
                </div>

                <button @click="saveEntry()" class="md:col-span-4 cinema-gradient text-white font-black py-5 rounded-2xl hover:brightness-110 shadow-lg uppercase tracking-[0.2em] text-sm mt-2">
                    Update Cloud Stats <i class="fa-solid fa-cloud-upload-alt ml-2"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-orange-100 overflow-hidden">
            <div class="p-8 cinema-gradient flex justify-between items-center text-white">
                <h2 class="font-black uppercase text-sm tracking-widest">Live Performance Feed</h2>
                <button @click="loadData()" class="bg-white/20 hover:bg-white/30 p-2 rounded-full transition">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-orange-50 text-[10px] font-black text-orange-600 uppercase">
                        <tr>
                            <th class="p-6">Date & Time</th>
                            <th class="p-6">Theatre</th>
                            <th class="p-6">Movie</th>
                            <th class="p-6">Occupancy</th>
                            <th class="p-6">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-orange-50">
                        <template x-for="r in reports">
                            <tr class="hover:bg-orange-50/50 transition" x-show="!selectedAnalyticMovie || r.movie === selectedAnalyticMovie">
                                <td class="p-6">
                                    <div class="text-[11px] font-black text-slate-800" x-text="r.date"></div>
                                    <div class="text-[10px] text-orange-500 font-bold uppercase" x-text="r.time"></div>
                                </td>
                                <td class="p-6">
                                    <div class="font-black text-slate-800" x-text="r.theater"></div>
                                    <div class="text-[10px] text-orange-400 font-bold uppercase" x-text="r.city + ' - ' + r.screen"></div>
                                </td>
                                <td class="p-6">
                                    <div class="font-black text-slate-800 uppercase" x-text="r.movie"></div>
                                    <div class="text-[10px] text-slate-400 font-bold italic" x-text="r.slot"></div>
                                </td>
                                <td class="p-6">
                                    <div class="flex items-center gap-3">
                                        <div class="text-lg font-black text-orange-600" x-text="Math.round((r.booked/r.total)*100) + '%'"></div>
                                        <div class="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden min-w-[80px]">
                                            <div class="h-full cinema-gradient" :style="`width: ${(r.booked/r.total)*100}%`"></div>
                                        </div>
                                    </div>
                                    <div class="text-[10px] font-bold text-slate-400 mt-1" x-text="r.booked + ' / ' + r.total + ' SEATS'"></div>
                                </td>
                                <td class="p-6 text-center">
                                    <button x-show="userRole === 'admin'" @click="deleteEntry(r.id)" class="text-slate-300 hover:text-red-500 transition">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</body>
</html>

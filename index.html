<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistriPro | Enterprise Distribution Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .sidebar-bg { background: #0f172a; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .active-link { background: #6366f1; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .movie-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex" x-data="appHandler()" x-init="initApp()">

    <aside :class="sidebarOpen ? 'w-72' : 'w-20'" x-show="page !== 'login'" 
           class="sidebar-bg text-slate-400 flex flex-col fixed h-full z-50 overflow-hidden shadow-2xl transition-all duration-300">
        
        <div class="p-6 border-b border-slate-800 flex items-center gap-4">
            <div class="bg-indigo-600 p-2.5 rounded-xl shrink-0 shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-layer-group text-white"></i>
            </div>
            <div x-show="sidebarOpen" x-transition class="whitespace-nowrap">
                <h1 class="text-xl font-bold text-white tracking-tight leading-none">DistriPro</h1>
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Enterprise v2.0</span>
            </div>
        </div>

        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button @click="section = 'home'" :class="section === 'home' ? 'active-link' : 'hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition">
                <i class="fa-solid fa-grid-2 w-5 text-center"></i> 
                <span x-show="sidebarOpen" class="font-semibold text-sm">Main Dashboard</span>
            </button>
            <button @click="section = 'update'" :class="section === 'update' ? 'active-link' : 'hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition">
                <i class="fa-solid fa-database w-5 text-center"></i> 
                <span x-show="sidebarOpen" class="font-semibold text-sm">Sync & Manual Entry</span>
            </button>
            <button x-show="userRole === 'admin'" @click="section = 'users'" :class="section === 'users' ? 'active-link' : 'hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition">
                <i class="fa-solid fa-user-shield w-5 text-center"></i> 
                <span x-show="sidebarOpen" class="font-semibold text-sm">User Management</span>
            </button>
            <button @click="section = 'history'" :class="section === 'history' ? 'active-link' : 'hover:bg-slate-800 hover:text-white'" class="w-full flex items-center gap-4 px-4 py-3.5 rounded-xl transition">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> 
                <span x-show="sidebarOpen" class="font-semibold text-sm">Historical Insights</span>
            </button>
        </nav>

        <div x-show="sidebarOpen" x-transition class="p-6 bg-slate-900/50 space-y-4">
            <div class="border-t border-slate-800 pt-4 text-[11px] text-slate-400 font-bold">
                <p class="text-indigo-500 uppercase text-[9px] mb-2 tracking-widest">Support Line</p>
                <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-phone"></i> 8019589448</div>
                <div class="flex items-center gap-2"><i class="fa-solid fa-phone"></i> 7989208164</div>
            </div>
            <div class="space-y-1">
                <p class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Technology Partner</p>
                <p class="text-xs font-bold text-white">Vasavi Softtech Solutions</p>
                <p class="text-[10px] italic text-slate-500">by KCMS Distributors</p>
            </div>
            <button @click="logout()" class="w-full py-3 bg-red-500/10 text-red-500 rounded-xl text-xs font-black uppercase hover:bg-red-500 hover:text-white transition">
                <i class="fa-solid fa-power-off mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 transition-all duration-300" :class="page !== 'login' ? (sidebarOpen ? 'ml-72' : 'ml-20') : ''">
        
        <div x-show="page === 'login'" class="flex items-center justify-center min-h-screen bg-slate-950 px-4">
            <div class="bg-white p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border-t-8 border-indigo-600">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-900">DistriPro</h2>
                    <p class="text-slate-400 text-sm font-semibold mt-1 uppercase tracking-widest">Enterprise Analytics</p>
                </div>
                <div class="space-y-5">
                    <input x-model="login.user" type="text" placeholder="Username" class="w-full p-4.5 bg-slate-50 border rounded-2xl outline-none focus:ring-4 ring-indigo-50">
                    <input x-model="login.pass" type="password" placeholder="Password" class="w-full p-4.5 bg-slate-50 border rounded-2xl outline-none focus:ring-4 ring-indigo-50">
                    <button @click="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition">Authenticate</button>
                </div>
            </div>
        </div>

        <div x-show="page === 'dashboard'" x-cloak>
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-10 py-6 sticky top-0 z-40 flex justify-between items-center">
                <div class="flex items-center gap-6">
                    <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-indigo-600 text-xl"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div>
                        <h2 class="text-2xl font-extrabold text-slate-900 capitalize leading-none" x-text="section.replace('-', ' ')"></h2>
                        <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest" x-text="'Role: ' + userRole"></span>
                    </div>
                </div>
                <div x-show="isLoading" class="animate-spin h-5 w-5 border-2 border-indigo-600 border-t-transparent rounded-full"></div>
            </header>

            <section x-show="section === 'home'" class="p-10 space-y-10">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="movie in uniqueMovies">
                        <div @click="selectedMovie = movie" :class="selectedMovie === movie ? 'ring-4 ring-indigo-500' : 'border-slate-200'" 
                             class="movie-card bg-white p-5 rounded-[2rem] border transition cursor-pointer shadow-sm group">
                            <div class="aspect-video bg-indigo-50 rounded-2xl mb-4 flex items-center justify-center text-indigo-300 text-4xl">
                                <i class="fa-solid fa-film"></i>
                            </div>
                            <h4 class="text-lg font-extrabold text-slate-800 uppercase" x-text="movie"></h4>
                        </div>
                    </template>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-indigo-100 flex flex-col justify-between h-44">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-70">Total Bookings</p>
                        <h2 class="text-5xl font-black" x-text="movieStats.booked"></h2>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col justify-between h-44">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Unique Screens</p>
                        <h2 class="text-5xl font-black text-slate-800" x-text="movieStats.screens"></h2>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col justify-between h-44">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Avg Occupancy</p>
                        <h2 class="text-5xl font-black text-indigo-500" x-text="Math.round((movieStats.booked / (movieStats.total || 1)) * 100) + '%'"></h2>
                    </div>
                </div>
            </section>

            <section x-show="section === 'update'" class="p-10 max-w-6xl mx-auto space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white rounded-[2.5rem] border border-slate-200 p-10 shadow-sm">
                        <h3 class="text-xl font-black mb-6">Auto API Sync</h3>
                        <div class="space-y-4">
                            <input x-model="extraction.movie" placeholder="Movie Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                            <input x-model="extraction.theater" placeholder="Theater Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                            <button @click="alert('Triggering API...')" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl">Start Extraction</button>
                        </div>
                    </div>
                    <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white shadow-2xl">
                        <h3 class="text-xl font-black mb-6">Manual Override</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input x-model="manual.movie" placeholder="Movie" class="col-span-2 p-4 bg-slate-800 border-none rounded-2xl text-white outline-none">
                            <input x-model="manual.theater" placeholder="Theater" class="p-4 bg-slate-800 border-none rounded-2xl text-white outline-none">
                            <input x-model="manual.booked" type="number" placeholder="Booked" class="p-4 bg-slate-800 border-none rounded-2xl text-white outline-none">
                            <button @click="saveManual()" class="col-span-2 bg-emerald-500 text-white font-bold py-5 rounded-2xl">Push Manual Data</button>
                        </div>
                    </div>
                </div>
            </section>

            <section x-show="section === 'users'" class="p-10 max-w-5xl mx-auto space-y-10">
                <div class="bg-white rounded-[2.5rem] border border-slate-200 p-10">
                    <h3 class="text-xl font-black mb-8 text-slate-800">Global Access Control</h3>
                    <div class="flex gap-4 mb-10 pb-10 border-b">
                        <input x-model="newUser.name" placeholder="New Username" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input x-model="newUser.pass" placeholder="Password" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
                        <button @click="addUser()" class="bg-indigo-600 text-white px-8 rounded-2xl font-bold">Add to Cloud</button>
                    </div>
                    <div class="space-y-4">
                        <template x-for="u in appUsers">
                            <div class="flex items-center justify-between p-6 bg-slate-50 rounded-[2rem] border">
                                <div class="flex items-center gap-5">
                                    <div class="h-12 w-12 bg-white rounded-full flex items-center justify-center shadow-sm text-indigo-600 font-black" x-text="u.name[0].toUpperCase()"></div>
                                    <div class="font-bold text-slate-900 uppercase" x-text="u.name"></div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-xs font-bold text-slate-400" x-text="u.pass"></span>
                                    <button @click="deleteUser(u.name)" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        const API_BASE = "https://distriproapi-heghfdc4auh3gtdm.eastus-01.azurewebsites.net/api";

        function appHandler() {
            return {
                sidebarOpen: true,
                page: 'login',
                section: 'home',
                userRole: '',
                isLoading: false,
                selectedMovie: '',
                login: { user: '', pass: '' },
                extraction: { movie: '', theater: '' },
                manual: { movie: '', theater: '', screen: 'Main', booked: '', total: 200 },
                newUser: { name: '', pass: '', role: 'viewer' },
                reports: [],
                appUsers: [],

                async initApp() {
                    this.loadUsers();
                },

                async loadUsers() {
                    try {
                        const res = await fetch(`${API_BASE}/manageusers`);
                        this.appUsers = await res.json();
                        if (this.appUsers.length === 0) this.appUsers = [{name: 'admin', pass: '8019589448', role: 'admin'}];
                    } catch (e) { console.error('User Sync Error'); }
                },

                async addUser() {
                    if (!this.newUser.name || !this.newUser.pass) return;
                    await fetch(`${API_BASE}/manageusers`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.newUser)
                    });
                    this.newUser = { name: '', pass: '', role: 'viewer' };
                    await this.loadUsers();
                },

                handleLogin() {
                    let u = this.appUsers.find(x => x.name === this.login.user && x.pass === this.login.pass);
                    if (u) {
                        this.userRole = u.role;
                        this.page = 'dashboard';
                        this.loadData();
                    } else { alert('Access Denied'); }
                },

                async loadData() {
                    this.isLoading = true;
                    try {
                        const res = await fetch(`${API_BASE}/syncdata`);
                        this.reports = await res.json();
                    } finally { this.isLoading = false; }
                },

                async saveManual() {
                    this.isLoading = true;
                    try {
                        const payload = {...this.manual, date: new Date().toISOString().split('T')[0], screen: 'Main', time: '18:00', city: 'Chennai'};
                        await fetch(`${API_BASE}/syncdata`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                        alert('Manual Data Synced!');
                        await this.loadData();
                    } finally { this.isLoading = false; }
                },

                logout() { this.page = 'login'; this.login = { user: '', pass: '' }; },
                get uniqueMovies() { return [...new Set(this.reports.map(r => r.movie))]; },
                get movieStats() {
                    let f = this.selectedMovie ? this.reports.filter(r => r.movie === this.selectedMovie) : this.reports;
                    return { booked: f.reduce((a,c) => a + c.booked, 0), total: f.reduce((a,c) => a + c.total, 0), screens: f.length };
                }
            }
        }
    </script>
</body>
</html>
